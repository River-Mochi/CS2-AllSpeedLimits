<svg xmlns="http://www.w3.org/2000/svg"
     width="40"
     height="40"
     viewBox="0 0 40 40"
     role="img"
     aria-label="Speed gauge icon">

  <g fill="none"
     stroke="#ffffff"
     stroke-linecap="round"
     stroke-linejoin="round">

    <!-- Outer ring -->
    <circle
      cx="20"
      cy="20"
      r="17"
      stroke-width="2.4" />

    <!-- Inner gauge arc -->
    <path
      d="M10 20 A10 10 0 0 1 30 20"
